slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    restamp_tf: false
    use_map_saver: false
    mode: mapping

    debug_logging: false
    throttle_scans: 1
    # Disable map->odom TF publishing; Point-LIO owns that transform.
    transform_publish_period: 0.0
    map_update_interval: 1.0
    resolution: 0.05
    min_laser_range: 0.3
    max_laser_range: 50.0
    minimum_travel_distance: 0.1
    # Disable scan matching; Point-LIO provides odometry, slam_toolbox only builds the map.
    use_scan_matching: false
