# Waypoint list for Scout Mini multi-waypoint navigation.
#
# Each entry defines one navigation goal in the specified TF frame.
#
# Fields:
#   frame_id : TF frame the coordinates are expressed in (typically "map")
#   x        : X position in metres
#   y        : Y position in metres
#   yaw      : Heading in radians (0 = +X axis, pi/2 = +Y axis)
#
# Edit this file to define your mission waypoints.
# The multi_waypoint_commander node reads this file at startup.
#
# Mission: Round-trip navigation from (0, 0) to (5.8, 4.0)
# Coordinates converted from map units (mm) to metres
#
# Waypoint sequence:
#   1. Start position (0, 0)
#   2. Target position (5.8, 4.0) - Upper right area
#   3. Return to start (0, 0) - for loop navigation

waypoints:
  # Waypoint 1: Start position (Blue Supply area)
  - frame_id: map
    x: 0.0
    y: 0.0
    yaw: 0.5404       # Facing towards target (atan2(4.0, 5.8) ≈ 0.5404 rad)

  # Waypoint 2: Target position (5800mm, 4000mm) -> (5.8m, 4.0m)
  # Located in the upper right area of the map
  - frame_id: map
    x: 5.8
    y: 4.0
    yaw: -2.6012      # Facing back towards start (0.5404 - π ≈ -2.6012 rad)

  # Waypoint 3: Return to start (for loop navigation)
  - frame_id: map
    x: 0.0
    y: 0.0
    yaw: 0.5404       # Facing towards target again
