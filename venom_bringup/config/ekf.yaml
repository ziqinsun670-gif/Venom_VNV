# EKF configuration for robot_localization ekf_node.
#
# Fuses the Livox MID360 IMU (/livox/imu, frame: livox_frame) to produce
# odom -> base_link TF and /odom topic.
#
# Only orientation (roll/pitch/yaw) and angular velocity are fused.
# Linear acceleration is excluded to avoid unbounded position drift from
# double-integrating accelerometer noise.
#
# robot_localization resolves the IMU frame (livox_frame) to base_link
# automatically via tf2 — the sentry_description launch must publish that TF.

ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    imu0: /livox/imu
    # State vector order: x, y, z, roll, pitch, yaw,
    #                     vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

    use_control: false
